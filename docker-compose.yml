version: "3.9"

services:
  # ── Ollama (local LLM inference) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # Pull Mistral on first start
    command: >
      sh -c "ollama serve & sleep 5 && ollama pull mistral && wait"

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: adaptive-backend
    working_dir: /app/backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=mistral
    volumes:
      - ./backend:/app/backend  # live reload in dev
    depends_on:
      - ollama
    restart: unless-stopped

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: adaptive-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules  # prevent overwrite by bind mount
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
